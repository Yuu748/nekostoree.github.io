<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Neko Store</title>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#0b1020;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.card{
    width:90%;
    max-width:400px;
    background:#131a2d;
    border-radius:20px;
    padding:30px;
    text-align:center;
    box-shadow:0 0 30px rgba(0,150,255,.3);
}

img{
    width:100px;
    height:100px;
    border-radius:50%;
    margin-bottom:15px;
}

h1{
    margin:10px 0;
}

p{
    color:#bdbdbd;
}

a{
    display:block;
    text-decoration:none;
    background:#1f6fff;
    color:white;
    padding:15px;
    margin:12px 0;
    border-radius:12px;
    font-weight:bold;
    transition:.3s;
}

a:hover{
    background:#3d8bff;
}

.footer{
    margin-top:20px;
    color:#888;
    font-size:14px;
}
</style>

</head>
<body>

<div class="card">

<img src="https://cdn-icons-png.flaticon.com/512/616/616408.png">

<h1>🐱 Neko Store</h1>

<p>Trusted Mobile Legends Account Store</p>

<a href="#">📘 Facebook</a>

<a href="#">🎵 TikTok</a>

<div class="footer">
© Neko Store
</div>

</div>

</body>
</html>
