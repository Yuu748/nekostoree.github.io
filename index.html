<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Neko Store</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{

background:#08111f;
color:white;

display:flex;
justify-content:center;
align-items:center;

height:100vh;

overflow:hidden;

}

.card{

width:90%;
max-width:420px;

background:#111b2f;

padding:35px;

border-radius:25px;

text-align:center;

box-shadow:0 0 30px rgba(0,170,255,.25);

}

.logo{

font-size:70px;

margin-bottom:10px;

}

h1{

font-size:40px;

margin-bottom:8px;

}

p{

color:#9db3cf;

margin-bottom:30px;

}

.button{

display:block;

background:#3d74ff;

color:white;

text-decoration:none;

padding:18px;

border-radius:15px;

margin-top:15px;

font-size:20px;

font-weight:bold;

transition:.25s;

}

.button:hover{

background:#5b8cff;

transform:scale(1.03);

}

.footer{

margin-top:30px;

font-size:14px;

color:#6f89aa;

}

</style>

</head>

<body>

<div class="card">

<div class="logo">👑🐱</div>

<h1>Neko Store</h1>

<p>Built on Trust.</p>

<a class="button" href="#">📱 WhatsApp</a>

<a class="button" href="#">📘 Facebook</a>

<a class="button" href="#">🎵 TikTok</a>

<a class="button" href="#">📷 Instagram</a>

<div class="footer">

© Neko Store 2026

</div>

</div>

</body>

</html>
